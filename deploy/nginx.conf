# /etc/nginx/sites-available/fidelislogic
# After copying:  sudo ln -s /etc/nginx/sites-available/fidelislogic /etc/nginx/sites-enabled/
#                 sudo nginx -t && sudo systemctl reload nginx
#                 sudo certbot --nginx -d fidelislogic.com -d www.fidelislogic.com

# ---- HTTP -> HTTPS redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name fidelislogic.com www.fidelislogic.com;
    return 301 https://$host$request_uri;
}

# ---- HTTPS main server ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fidelislogic.com www.fidelislogic.com;

    # These lines are added automatically by certbot on first run.
    # ssl_certificate     /etc/letsencrypt/live/fidelislogic.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fidelislogic.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Uploads (BrandLead/Contact forms may include images or PDFs)
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ---- 1) API -> FastAPI (uvicorn) ----
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ---- 2) Static React build ----
    root  /var/www/fidelislogic;
    index index.html;

    # Long-cache hashed CRA build assets
    location /static/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache sitemap.xml / robots.txt (dynamic-ish)
    location = /sitemap.xml { proxy_pass http://127.0.0.1:8001/api/sitemap.xml; }
    location = /robots.txt  { try_files $uri =404; }

    # SPA fallback -- React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
